{% extends "MainApp/base.html" %}
{% load bootstrap4 %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">
        <div class="card shadow-lg border-0 rounded-lg">
            <div class="card-header bg-white text-dark text-center py-4 border-0 mt-3">
                <h2 class="font-weight-light">Create an Account</h2>
                <p class="text-muted small">Start your learning journey today.</p>
            </div>
            <div class="card-body px-5 pb-5">
                <form action="{% url 'users:register' %}" method="post" class="mt-2">
                    {% csrf_token %}
                    {% bootstrap_form form %}
                    <div class="form-group mt-5">
                        <button name="submit" class="btn btn-primary btn-block btn-lg shadow-sm rounded-pill py-3">Register &raquo;</button>
                    </div>
                </form>
            </div>
            <div class="card-footer text-center py-3 bg-light border-0">
                <p class="mb-0 small text-muted">Already have an account? <a href="{% url 'users:login' %}" class="font-weight-bold">Log in</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
